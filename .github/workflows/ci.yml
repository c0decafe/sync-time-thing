name: SyncTimeThing CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run devenv test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Setup devenv on the default GitHub runner
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          devenv-version: v2.0.6

      - name: Run full test harness
        run: |
          set -euo pipefail
          devenv --no-tui test

  build-prod:
    name: Build prod container
    if: github.event_name != 'push' || (github.ref_type == 'branch' && github.ref_name != github.event.repository.default_branch)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Setup devenv on the default GitHub runner
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          devenv-version: v2.0.6

      - name: Build prod image
        run: |
          set -euo pipefail
          devenv --no-tui container build prod
